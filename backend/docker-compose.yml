services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: factoryos
      POSTGRES_USER: factoryos
      POSTGRES_PASSWORD: factoryos
    ports:
      - "5432:5432"
    volumes:
      - factoryos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factoryos -d factoryos"]
      interval: 5s
      timeout: 5s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  factoryos_pg:
